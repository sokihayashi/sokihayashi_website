let rad = new Float32Array(MAXP);
let agit = 0;
let dissolve = 0;
let cutNX = 1, cutNY = 0, cutAmt = 0;

function deviceCaps(){
  const mob = min(windowWidth, windowHeight) < 700;
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const native = max(windowWidth, windowHeight) * dpr;
  let start = mob ? CONFIG.res.startMobile : CONFIG.res.startDesktop;
  let mx2   = mob ? CONFIG.res.maxMobile   : CONFIG.res.maxDesktop;
  mx2   = min(mx2, native);
  start = min(start, mx2);
  return { start, max: mx2 };
}
function renderSize(){
  const a = windowWidth / windowHeight;
  let w, h;
  if (windowWidth >= windowHeight){ w = rmLong; h = Math.round(rmLong / a); }
  else                            { h = rmLong; w = Math.round(rmLong * a); }
  return { w: max(2, w), h: max(2, h) };
}
function applyDisplaySize(){
  cnv.style('width',  windowWidth  + 'px');
  cnv.style('height', windowHeight + 'px');
}
function reflow(){
  const r = renderSize();
  resizeCanvas(r.w, r.h);
  if (sceneG) sceneG.resizeCanvas(r.w, r.h);
  applyDisplaySize();
}

function buildBgTex(){
  if (bgTex) bgTex.remove();
  if (logoImg) logoAspect = logoImg.width / logoImg.height;

  const texH = 1280;
  const texW = max(2, round(texH * logoAspect));
  const g = createGraphics(texW, texH);
  g.pixelDensity(1);
  g.background(CONFIG.bgPaper);
  g.noStroke();
  if (logoImg){
    g.image(logoImg, 0, 0, texW, texH);
  } else {
    g.fill(CONFIG.bgInk);
    g.textFont('Helvetica');
    g.textStyle(BOLD);
    g.textAlign(CENTER, CENTER);
    g.textSize(texH * 0.16);
    g.text('HDW', texW / 2, texH / 2);
  }
  bgTex = g;
}

function preload(){
  if (CONFIG.logoUrl){
    logoImg = loadImage(CONFIG.logoUrl, () => {}, () => { logoImg = null; });
  }
}

function formScaleFactor(){
  const s = constrain(map(min(windowWidth, windowHeight), 380, 1200, 0.9, 1.45), 0.9, 1.6);
  return s * CONFIG.formScale;
}

function setup(){
  pixelDensity(1);
  const c = deviceCaps();
  rmMaxDev = c.max;
  rmLong = min(c.start, rmMaxDev);
  const r = renderSize();
  cnv = createCanvas(r.w, r.h, WEBGL);
  applyDisplaySize();
  noStroke();

  sceneG = createGraphics(r.w, r.h, WEBGL);
  sceneG.pixelDensity(1);
  sceneG.noStroke();
  myShader = sceneG.createShader(vs, fs);
  postShader = createShader(postVS, postFS);
  buildBgTex();

  window.addEventListener('message', (e) => {
    const d = e.data;
    if (d && typeof d.hdwScroll === 'number'){
      scrollTarget = constrain(d.hdwScroll, 0, 1);
      lastScrollMsg = millis();
    }
    // 親ページからのタップ転送(iframeはpointer-events:none=縦スクロール安全)
    if (d && d.hdwPoke){
      poke(d.hdwPoke.x * width, d.hdwPoke.y * height);
    }
    // 親ページからのスワイプ転送(水平ドラッグ=カット)
    if (d && d.hdwSwipe){
      const dx = d.hdwSwipe.dx * width, dy = d.hdwSwipe.dy * height;
      const sp = Math.hypot(dx, dy);
      if (sp > 8 && Math.abs(dx) >= Math.abs(dy) && millis() - lastCutTime > 200){
        const L = sp || 1;
        cutNX = dy / L; cutNY = dx / L; cutAmt = 1.0;
        impulseCut(cutNX, cutNY, Math.min(0.16, sp * 0.010));
        spawnDrops(2);
        lastCutTime = millis();
      }
      lastInteract = millis();
    }
  });
  resetParticles();
}
function resetParticles(){
  nActive = BASE;
  for (let i = 0; i < MAXP; i++){
    if (i < BASE){
      const v = p5.Vector.random3D().mult(random(0.12, 0.40));
      pos[i*3] = v.x; pos[i*3+1] = v.y; pos[i*3+2] = v.z;
      rad[i] = random(0.15, 0.22);
    } else {
      rad[i] = 0;
    }
    vel[i*3] = vel[i*3+1] = vel[i*3+2] = 0;
  }
}
function windowResized(){
  const c = deviceCaps();
  rmMaxDev = c.max;
  rmLong = constrain(rmLong, CONFIG.res.min, rmMaxDev);
  reflow();
}

function adaptResolution(){
  fpsAvg = lerp(fpsAvg, frameRate(), 0.08);
  if (adjustCool > 0){ adjustCool--; return; }
  if (frameCount < 60) return;

  if (fpsAvg < 45 && rmLong > CONFIG.res.min){
    rmLong = max(CONFIG.res.min, floor(rmLong * 0.85));
    reflow(); adjustCool = 90;
  }
}

function draw(){
  if (!myShader) return;
  shader(myShader);

  const now = millis();
  const idle = (now - lastInteract) > 2200;
  if (idle){
    tmx = sin(now * 0.00028) * 0.05;
    tmy = cos(now * 0.00037) * 0.045;
  }

  vmx += (tmx - mx) * 0.022; vmx *= 0.86; mx += vmx;
  vmy += (tmy - my) * 0.022; vmy *= 0.86; my += vmy;
  stepSim();
  if (agit < 0.05 && now - lastInteract > 2200 && frameCount % 12 === 0) mergeStep();
  cutAmt *= 0.88;
  dissolve *= 0.992;
  updateDrops();

  scrollProg += (scrollTarget - scrollProg) * 0.08;
  let logoRot;
  if (millis() - lastScrollMsg < 2500){
    logoRot = (scrollProg - 0.5) * 2.0 * CONFIG.logoTiltMax;
  } else {
    logoRot = sin(millis() * 0.0004) * CONFIG.logoTiltMax * 0.5;
  }

  sceneG.shader(myShader);
  myShader.setUniform('u_resolution', [float(width), float(height)]);
  myShader.setUniform('u_time', now / 1000.0);
  myShader.setUniform('u_mouse', [mx, my]);
  myShader.setUniform('u_agit', agit);
  myShader.setUniform('u_rotation', [0.0, 0.0]);
  myShader.setUniform('u_directions', pos);
  myShader.setUniform('u_vel', vel);
  myShader.setUniform('u_rad', rad);
  myShader.setUniform('u_nActive', nActive);
  myShader.setUniform('u_accent', CONFIG.accent);
  myShader.setUniform('u_bg', bgTex);
  myShader.setUniform('u_glassTint', CONFIG.glassTint);
  myShader.setUniform('u_planeZ', CONFIG.planeZ);
  myShader.setUniform('u_logoHalfH', CONFIG.logoWorld);
  myShader.setUniform('u_logoHalfW', CONFIG.logoWorld * logoAspect);
  myShader.setUniform('u_absorb', CONFIG.absorb);
  myShader.setUniform('u_disp', CONFIG.dispersion);
  myShader.setUniform('u_flip', CONFIG.flipBg ? 1.0 : 0.0);
  myShader.setUniform('u_scale', formScaleFactor());
  myShader.setUniform('u_logoRot', logoRot);
  myShader.setUniform('u_core', CONFIG.coreSize * (1.0 - 0.90 * agit) * (1.0 - dissolve));
  myShader.setUniform('u_dissolve', dissolve);
  myShader.setUniform('u_cutDir', [cutNX, cutNY]);
  myShader.setUniform('u_cutAmt', cutAmt);
  myShader.setUniform('u_cutWidth', CONFIG.cutWidth);
  sceneG.beginShape();
  sceneG.vertex(-1, -1, 0);
  sceneG.vertex( 1, -1, 0);
  sceneG.vertex( 1,  1, 0);
  sceneG.vertex(-1,  1, 0);
  sceneG.endShape(CLOSE);

  shader(postShader);
  postShader.setUniform('u_scene', sceneG);
  postShader.setUniform('u_resolution', [float(width), float(height)]);
  postShader.setUniform('u_time', now / 1000.0);
  postShader.setUniform('u_drops', dropBuf);
  postShader.setUniform('u_sceneFlip', 1.0);
  beginShape();
  vertex(-1, -1, 0);
  vertex( 1, -1, 0);
  vertex( 1,  1, 0);
  vertex(-1,  1, 0);
  endShape(CLOSE);

  adaptResolution();
}

function stepSim(){
  const kHome = 0.011, damp = 0.94, g = 0.0004, kRep = 0.05;
  for (let i = 0; i < nActive; i++){
    const o = i * 3;
    let fx = -pos[o] * kHome;
    let fy = -pos[o+1] * kHome - g;
    let fz = -pos[o+2] * kHome;
    for (let j = 0; j < nActive; j++){
      if (j === i) continue;
      const p = j * 3;
      const dx = pos[o] - pos[p], dy = pos[o+1] - pos[p+1], dz = pos[o+2] - pos[p+2];
      const dist = Math.hypot(dx, dy, dz) || 1e-4;
      const md = (rad[i] + rad[j]) * 0.85;
      if (dist < md){ const f = (md - dist) / md * kRep; fx += dx/dist*f; fy += dy/dist*f; fz += dz/dist*f; }
    }
    fx += (Math.random() - 0.5) * 0.0006;
    fy += (Math.random() - 0.5) * 0.0006;
    fz += (Math.random() - 0.5) * 0.0006;
    vel[o] += fx; vel[o+1] += fy; vel[o+2] += fz;
    vel[o] *= damp; vel[o+1] *= damp; vel[o+2] *= damp;
  }
  let e = 0;
  for (let i = 0; i < nActive; i++){
    const o = i * 3;
    pos[o] += vel[o]; pos[o+1] += vel[o+1]; pos[o+2] += vel[o+2];
    e += Math.hypot(vel[o], vel[o+1], vel[o+2]);
  }
  agit = constrain((e / nActive) * 16.0, 0, 1);
}
function splitParticles(str){          // タップ=各粒が2つに分裂(指数関数的に増える)＋刺々しく弾ける
  const cur = nActive;
  for (let i = 0; i < cur && nActive < MAXP; i++){
    const j = nActive++;
    const o = i * 3, p = j * 3;
    const rr = rad[i] * 0.7937;        // 体積を保ちつつ半径を縮小(2^-1/3)
    rad[i] = rr; rad[j] = rr;
    pos[p]   = pos[o]   + (Math.random() - 0.5) * 0.04;
    pos[p+1] = pos[o+1] + (Math.random() - 0.5) * 0.04;
    pos[p+2] = pos[o+2] + (Math.random() - 0.5) * 0.04;
    let vx = Math.random() - 0.5, vy = Math.random() - 0.5, vz = Math.random() - 0.5;
    const L = Math.hypot(vx, vy, vz) || 1; vx /= L; vy /= L; vz /= L;
    vel[o]   += vx * str; vel[o+1] += vy * str; vel[o+2] += vz * str;  // 親子で逆向きに飛ぶ
    vel[p]    = -vx * str; vel[p+1]  = -vy * str; vel[p+2]  = -vz * str;
  }
}
function mergeStep(){                   // 落ち着いたら最近接ペアを融合→徐々に再形成
  if (nActive <= BASE) return;
  let bi = 0, bj = 1, bd = 1e9;
  for (let i = 0; i < nActive; i++) for (let j = i + 1; j < nActive; j++){
    const d = Math.hypot(pos[i*3]-pos[j*3], pos[i*3+1]-pos[j*3+1], pos[i*3+2]-pos[j*3+2]);
    if (d < bd){ bd = d; bi = i; bj = j; }
  }
  const oi = bi*3, oj = bj*3;
  pos[oi] = (pos[oi]+pos[oj])*0.5; pos[oi+1] = (pos[oi+1]+pos[oj+1])*0.5; pos[oi+2] = (pos[oi+2]+pos[oj+2])*0.5;
  vel[oi] = (vel[oi]+vel[oj])*0.5; vel[oi+1] = (vel[oi+1]+vel[oj+1])*0.5; vel[oi+2] = (vel[oi+2]+vel[oj+2])*0.5;
  rad[bi] = Math.cbrt(rad[bi]**3 + rad[bj]**3);
  const last = nActive - 1;
  if (bj !== last){
    pos[bj*3]=pos[last*3]; pos[bj*3+1]=pos[last*3+1]; pos[bj*3+2]=pos[last*3+2];
    vel[bj*3]=vel[last*3]; vel[bj*3+1]=vel[last*3+1]; vel[bj*3+2]=vel[last*3+2];
    rad[bj]=rad[last];
  }
  nActive--;
}
function impulseCut(nx, ny, str){
  for (let i = 0; i < nActive; i++){
    const o = i * 3;
    const side = (pos[o] * nx + pos[o+1] * ny) >= 0 ? 1 : -1;
    vel[o]   += nx * side * str;
    vel[o+1] += ny * side * str;
  }
}

function poke(px, py){
  const tx = map(px, 0, width, -1.0, 1.0);
  const ty = map(py, 0, height, 1.0, -1.0);
  const now = millis();
  const dt = now - lastTap; lastTap = now;
  const rapid = constrain(map(dt, 80, 520, 1.0, 0.12), 0.12, 1.0);

  const prox = constrain(1.0 - Math.hypot(tx - mx, ty - my) * 1.6, 0.0, 1.0);
  if (prox <= 0.02) return;
  splitParticles((0.07 + rapid * 0.12) * prox);
  dissolve = min(1.0, dissolve + (0.03 + rapid * 0.10) * prox);
  spawnDrops(Math.floor(1 + rapid * 3));
  lastInteract = now;
}
function swipe(){
  const dx = mouseX - pmouseX, dy = mouseY - pmouseY;
  const sp = mag(dx, dy);

  if (sp > 8 && abs(dx) >= abs(dy) && millis() - lastCutTime > 200){
    const L = Math.hypot(dx, dy) || 1;
    cutNX = dy / L; cutNY = dx / L; cutAmt = 1.0;
    impulseCut(cutNX, cutNY, Math.min(0.16, sp * 0.010));
    spawnDrops(2);
    lastCutTime = millis();
  }
  lastInteract = millis();
}

function spawnDrops(n){
  for (let i = 0; i < n; i++){
    if (drops.length >= MAXDROPS) drops.shift();
    drops.push({
      x: random(0.05, 0.95),
      y: random(0.20, 0.95),
      r: random(0.003, 0.006),
      vy: random(0.0002, 0.0010),
    });
  }
}
function updateDrops(){
  for (let k = drops.length - 1; k >= 0; k--){
    const d = drops[k];
    d.vy += 0.000004;
    d.y  -= d.vy;
    if (d.y < -0.06) drops.splice(k, 1);
  }
  for (let i = 0; i < MAXDROPS; i++){
    const o = i * 4;
    if (i < drops.length){
      dropBuf[o] = drops[i].x; dropBuf[o+1] = drops[i].y;
      dropBuf[o+2] = drops[i].r; dropBuf[o+3] = 1.0;
    } else {
      dropBuf[o] = dropBuf[o+1] = dropBuf[o+2] = dropBuf[o+3] = 0;
    }
  }
}

function touchStarted(){ poke(mouseX, mouseY); }
function touchMoved(){ swipe(); }
function mousePressed(){ poke(mouseX, mouseY); }
function mouseDragged(){ swipe(); }

const vs = `
  attribute vec3 aPosition;
  void main(){ gl_Position = vec4(aPosition, 1.0); }
`;

const postVS = `
  attribute vec3 aPosition;
  void main(){ gl_Position = vec4(aPosition, 1.0); }
`;
const postFS = `
  precision highp float;
  uniform sampler2D u_scene;
  uniform vec2  u_resolution;
  uniform float u_time;
  uniform vec4  u_drops[30];
  uniform float u_sceneFlip;

  float noise(vec2 p){ return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

  vec3 scn(vec2 uv){
    uv = clamp(uv, 0.0, 1.0);
    if (u_sceneFlip > 0.5) uv.y = 1.0 - uv.y;
    return texture2D(u_scene, uv).rgb;
  }

  void main(){
    vec2 suv = gl_FragCoord.xy / u_resolution.xy;
    vec3 col = scn(suv);
    float asp = u_resolution.x / u_resolution.y;

    for (int i = 0; i < 30; i++){
      vec4 dp = u_drops[i];
      if (dp.w <= 0.001) continue;
      vec2 diff = suv - dp.xy; diff.x *= asp;
      float r = dp.z;
      float dist = length(diff);
      if (dist > r) continue;
      float h = dist / r;
      float cz = sqrt(max(0.0, 1.0 - h * h));
      vec2 invUV = dp.xy - (suv - dp.xy) * 1.8;
      vec2 edgeOff = (diff / r) * (1.0 - cz) * (r * 0.5); edgeOff.x /= asp;
      vec3 c = scn(invUV - edgeOff);
      float rim = smoothstep(0.82, 0.95, h) * (1.0 - smoothstep(0.95, 1.0, h));
      float hl  = 1.0 - smoothstep(0.0, 0.16 * r, length(diff - vec2(-0.30, 0.34) * r));
      c += hl * 1.1;
      c += rim * 0.45;
      c *= 1.0 - smoothstep(0.92, 1.0, h) * 0.55;
      float mask = smoothstep(1.0, 0.95, h) * clamp(dp.w, 0.0, 1.0) * 0.85;
      col = mix(col, c, mask);
    }
    gl_FragColor = vec4(col, 1.0);
  }
`;

const fs = `
  precision highp float;
  uniform float u_time;
  uniform vec2  u_resolution;
  uniform vec2  u_mouse;
  uniform float u_agit;
  uniform vec2  u_rotation;
  uniform vec3  u_directions[40];
  uniform vec3  u_vel[40];
  uniform float u_rad[40];
  uniform float u_nActive;
  uniform vec3  u_accent;
  uniform sampler2D u_bg;
  uniform float u_glassTint;
  uniform float u_planeZ;
  uniform float u_logoHalfW;
  uniform float u_logoHalfH;
  uniform float u_absorb;
  uniform float u_disp;
  uniform float u_flip;
  uniform float u_scale;
  uniform float u_logoRot;
  uniform float u_core;
  uniform float u_dissolve;
  uniform vec2  u_cutDir;
  uniform float u_cutAmt;
  uniform float u_cutWidth;

  float noise(vec2 p){ return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

  vec3 aces(vec3 x){
    return clamp((x * (2.51 * x + 0.03)) / (x * (2.43 * x + 0.59) + 0.14), 0.0, 1.0);
  }

  vec3 rotate(vec3 p, vec2 r){
    float s = sin(r.x), c = cos(r.x);
    p.yz *= mat2(c, -s, s, c);
    s = sin(r.y); c = cos(r.y);
    p.xz *= mat2(c, s, -s, c);
    return p;
  }

  float smin(float a, float b, float k){
    float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
    return mix(b, a, h) - k * h * (1.0 - h);
  }

  float mapScene(vec3 p){

    p += 0.02 * vec3(
      sin(p.y * 3.5 + u_time * 1.3),
      sin(p.z * 3.5 + u_time * 1.1),
      sin(p.x * 3.5 + u_time * 1.6)
    );
    vec3 mousePos = vec3(u_mouse * 0.6, 0.0);
    float d = 1e10;

    float blendK = mix(0.34, 0.025, u_agit);   // 興奮で鋭く=刺々しい / 安定で滑らかな球
    for (int i = 0; i < 40; i++){
      if (float(i) >= u_nActive) break;
      vec3 parentPos = mousePos + u_directions[i];
      float pSize = u_rad[i] * (1.0 - u_dissolve);

      vec3 rel = p - parentPos;
      vec3 v = u_vel[i];
      float vl = length(v);
      if (vl > 1e-4) rel -= (v / vl) * dot(rel, v / vl) * min(vl * 13.0, 0.8); // 速いほど刺状に伸びる
      float drop = length(rel) - pSize;
      d = smin(d, drop, blendK);
    }

    float core = length(p - mousePos) - u_core;
    d = smin(d, core, 0.40);
    d += (sin(p.x * 24.0) * sin(p.y * 26.0) * sin(p.z * 22.0)) * 0.016 * clamp(u_agit + u_dissolve, 0.0, 1.0);

    if (u_cutAmt > 0.001){
      d = max(d, u_cutWidth * u_cutAmt - abs(dot(p.xy - mousePos.xy, u_cutDir)));
    }
    return d;
  }

  vec3 getNormal(vec3 p){
    const vec2 k = vec2(1.0, -1.0);
    const float e = 0.01;
    return normalize(
      k.xyy * mapScene(p + k.xyy * e) +
      k.yyx * mapScene(p + k.yyx * e) +
      k.yxy * mapScene(p + k.yxy * e) +
      k.xxx * mapScene(p + k.xxx * e)
    );
  }

  vec3 env(vec3 r){
    vec3 rn = normalize(r);
    float y = rn.y * 0.5 + 0.5;
    vec3 grad = mix(vec3(0.02), vec3(0.22), smoothstep(0.0, 1.0, y));
    float key  = pow(max(dot(rn, normalize(vec3( 0.35, 0.80, 0.50))), 0.0), 6.0);
    float key2 = pow(max(dot(rn, normalize(vec3(-0.25, 0.55, 0.80))), 0.0), 16.0);
    float fill = pow(max(dot(rn, normalize(vec3(-0.55, 0.10, 0.60))), 0.0), 10.0);
    vec3 c = grad;
    c += vec3(1.6) * key;
    c += vec3(1.1) * key2;
    c += vec3(0.16, 0.20, 0.30) * fill;
    return c;
  }

  vec2 logoUV(vec2 uv){
    vec2 s = uv - 0.5;
    float ca = cos(u_logoRot), sa = sin(u_logoRot);
    float D = 2.2;
    float X = s.x * D / (D * ca + s.x * sa);
    float depth = D - X * sa;
    float Y = s.y * depth / D;
    return vec2(X, Y) + 0.5;
  }

  vec3 bgAt(vec2 uv){
    uv = logoUV(uv);
    if (u_flip > 0.5) uv.y = 1.0 - uv.y;
    if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) return vec3(0.0);
    return texture2D(u_bg, uv).rgb;
  }

  vec3 background(vec2 s){
    vec2 uvc = (s * 2.0 - 1.0) * (u_resolution / min(u_resolution.x, u_resolution.y));
    vec3 ro2 = vec3(0.0, 0.0, 4.6);
    vec3 rd2 = normalize(vec3(uvc / u_scale, -2.2));
    float tp = (u_planeZ - ro2.z) / min(rd2.z, -0.001);
    vec3 qq = ro2 + rd2 * tp;
    vec2 luv = vec2(qq.x / (2.0 * u_logoHalfW), qq.y / (2.0 * u_logoHalfH)) + 0.5;
    return bgAt(luv);
  }

  void main(){
    vec2 uv  = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.x, u_resolution.y);
    vec2 suv = gl_FragCoord.xy / u_resolution.xy;

    vec3 ro = vec3(0.0, 0.0, 4.6);
    vec3 rd = normalize(vec3(uv / u_scale, -2.2));

    vec3 bg = background(suv);
    vec3 col = bg;

    float nearest = 1e9;
    bool hit = false;
    float t = 0.0;
    for (int i = 0; i < 84; i++){
      vec3 p = ro + rd * t;
      float d = mapScene(p);
      nearest = min(nearest, d);
      if (d < 0.0012){
        hit = true;
        vec3 n  = getNormal(p);

        n = normalize(n + 0.045 * vec3(
          sin(p.y * 20.0 + u_time * 1.4),
          sin(p.z * 20.0 + u_time * 1.1),
          sin(p.x * 20.0 + u_time * 1.7)
        ));
        vec3 vd = -rd;

        vec3 hlf  = normalize(normalize(vec3(0.5, 0.9, 0.8)) + vd);
        float spec = pow(max(dot(n, hlf), 0.0), 90.0);
        float fres = pow(1.0 - max(dot(n, vd), 0.0), 4.0);

        vec3 rdir = refract(rd, n, 0.72);
        float tp = (u_planeZ - p.z) / min(rdir.z, -0.001);
        vec3 q = p + rdir * tp;
        vec2 luv = vec2(q.x / (2.0 * u_logoHalfW), q.y / (2.0 * u_logoHalfH)) + 0.5;
        float dsp = u_disp * (0.3 + fres);
        vec3 refr = vec3(
          bgAt(luv + vec2(dsp, 0.0)).r,
          bgAt(luv).g,
          bgAt(luv - vec2(dsp, 0.0)).b
        );
        refr *= u_glassTint;

        float thick = 0.0;
        vec3 ip = p + rdir * 0.02;
        for (int k = 0; k < 10; k++){
          if (mapScene(ip) > 0.0) break;
          ip += rdir * 0.085;
          thick += 0.085;
        }
        refr *= exp(-thick * u_absorb * vec3(1.02, 1.0, 0.97));

        vec3 envCol = env(reflect(rd, n));

        vec3 glass = mix(refr, envCol, 0.1 + fres * 0.6);
        glass += spec * 1.6;
        glass += pow(fres, 1.5) * vec3(0.55);
        glass += fres * u_accent * 0.06;

        col = glass;
        break;
      }
      t += d;
      if (t > 11.0) break;
    }

    col = aces(col * 1.06);
    col *= 1.05 - length(uv) * 0.18;
    float lum = max(col.r, max(col.g, col.b));
    col += (noise(uv * 500.0 + u_time) - 0.5) * 0.022 * smoothstep(0.0, 0.12, lum);
    gl_FragColor = vec4(col, 1.0);
  }
`;
